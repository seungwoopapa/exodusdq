<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>데일리 퀘스트 ‘발굴’ 아카이브</title><style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--accent:#4b61ff;--soft:#eef1ff;--soft2:#f8fafc;--new:#ff4b6a;}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}.wrap{max-width:1180px;margin:0 auto;padding:32px 22px 70px}.hero{background:linear-gradient(135deg,#ffffff,#eef1ff);border:1px solid var(--line);border-radius:24px;padding:28px 30px;box-shadow:0 10px 30px rgba(20,30,80,.06)}h1{margin:0 0 8px;font-size:30px;letter-spacing:-.04em}.sub{color:var(--muted);margin:0;font-size:15px}.stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 16px;min-width:120px}.stat b{font-size:22px;color:var(--accent);display:block}.stat.new b{color:var(--new)}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;font-weight:800;color:var(--accent);cursor:pointer}.chip.latest{border-color:#ffd4dc;color:var(--new);background:#fff7f8}.chip small{color:var(--muted);font-weight:700;margin-left:3px}.controls{position:sticky;top:0;z-index:10;background:rgba(246,247,251,.94);backdrop-filter:blur(10px);padding:14px 0;margin:16px 0 26px;border-bottom:1px solid rgba(226,232,240,.7)}.controlrow{display:flex;gap:10px;flex-wrap:wrap}input,select{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff;font-size:14px;outline:none}input:focus,select:focus{border-color:#aab4ff;box-shadow:0 0 0 3px rgba(75,97,255,.12)}input{flex:1;min-width:260px}select{min-width:120px}.result-info{color:var(--muted);font-size:14px;margin:-10px 0 22px}.date-section{margin-top:30px}.date-title{display:flex;align-items:center;gap:10px;margin:0 0 14px;font-size:24px;letter-spacing:-.03em}.badge{display:inline-block;border-radius:999px;background:var(--soft);color:var(--accent);padding:4px 10px;font-size:13px;font-weight:800}.badge.new{background:#fff0f3;color:var(--new)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(20,30,80,.045);transition:.15s}.card:hover{box-shadow:0 10px 26px rgba(20,30,80,.08);transform:translateY(-1px)}.card.latest{border-color:#ffd4dc}.meta{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:10px}.name{font-size:19px;font-weight:900;letter-spacing:-.03em}.small{color:var(--muted);font-size:13px}.section{margin-top:12px}.label{font-size:12px;font-weight:900;color:var(--accent);margin-bottom:5px}.text{white-space:pre-wrap;font-size:14px}.body-full{border-top:1px dashed var(--line);margin-top:14px;padding-top:12px;color:#233044}details{margin-top:12px}summary{cursor:pointer;color:var(--accent);font-weight:800;font-size:13px}.empty{padding:50px 20px;text-align:center;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:18px}@media(max-width:700px){.wrap{padding:18px 14px 40px}.hero{padding:22px 20px}h1{font-size:25px}.controlrow{display:grid;grid-template-columns:1fr 1fr}input{grid-column:1/-1;min-width:0}select{min-width:0;width:100%}.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><section class="hero"><h1>데일리 퀘스트 ‘발굴’ 아카이브</h1><p class="sub">공유용 가명 버전입니다. 같은 가명은 같은 수강생을 의미합니다.</p><div class="stats"><div class="stat"><b>177</b>발굴 제출</div><div class="stat"><b>20</b>수강생</div><div class="stat"><b>9</b>날짜</div><div class="stat new"><b>18</b>오늘 추가</div></div><div class="chips" id="dateChips"></div></section><div class="controls"><div class="controlrow"><input id="q" placeholder="검색: 이름, 욕구, 타겟, 옵션 등"><select id="date"><option value="">전체 날짜</option></select><select id="group"><option value="">전체 조</option></select></div></div><div class="result-info" id="resultInfo"></div><main id="app"></main></div><script>
let DATA=[];
let dates=[];
let latest='';
let groups=[];
function updateStats(){const values=document.querySelectorAll('.stats .stat b');if(values.length>=4){const counts={};DATA.forEach(r=>counts[r.date]=(counts[r.date]||0)+1);values[0].textContent=DATA.length;values[1].textContent=new Set(DATA.map(r=>r.student).filter(Boolean)).size;values[2].textContent=dates.length;values[3].textContent=latest?(counts[latest]||0):0;}}
async function loadData(){try{const res=await fetch('./data.json',{cache:'no-store'});if(!res.ok)throw new Error('data.json을 불러오지 못했습니다.');const payload=await res.json();DATA=Array.isArray(payload)?payload:(payload.records||[]);init();}catch(err){document.getElementById('resultInfo').textContent='data.json을 불러오지 못했습니다.';document.getElementById('app').innerHTML='<div class="empty">데이터를 불러오는 중 문제가 발생했습니다.</div>';}}
const $=id=>document.getElementById(id);const esc=s=>(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function section(label,text){if(!text)return '';return `<div class="section"><div class="label">${label}</div><div class="text">${esc(text)}</div></div>`}
function card(r){const isNew=r.date===latest;return `<article class="card ${isNew?'latest':''}"><div class="meta"><div><div class="name">${esc(r.student)} <span class="badge">${r.group?esc(r.group)+'조':'조 미상'}</span> ${isNew?'<span class="badge new">NEW</span>':''}</div><div class="small">작성자: ${esc(r.sender)} · ${esc(r.time)}</div></div></div>${section('욕구',r.desire)}${section('핵심 ESS',r.ess)}${section('타겟',r.target)}${section('키워드',r.keywords)}${section('시장의 옵션',r.market_options)}${section('기존 옵션의 한계',r.limits)}${section('제시 옵션 / 아이템',r.proposed_option)}${section('전략 / 근거',r.strategy)}<details><summary>원문 전체 보기</summary><div class="text body-full">${esc(r.body)}</div></details></article>`}
function render(){const q=$('q').value.trim().toLowerCase(),d=$('date').value,g=$('group').value;const filtered=DATA.filter(r=>(!d||r.date===d)&&(!g||r.group===g)&&(!q||Object.values(r).join(' ').toLowerCase().includes(q)));$('resultInfo').textContent=`현재 ${filtered.length}개 표시 / 전체 ${DATA.length}개`;const by={};filtered.forEach(r=>(by[r.date]||(by[r.date]=[])).push(r));$('app').innerHTML=Object.keys(by).sort().map(date=>`<section class="date-section"><h2 class="date-title">${date} <span class="badge">${by[date].length}건</span>${date===latest?'<span class="badge new">오늘 추가</span>':''}</h2><div class="grid">${by[date].map(card).join('')}</div></section>`).join('')||'<div class="empty">조건에 맞는 발굴 퀘스트가 없습니다.</div>';}
function init(){dates=[...new Set(DATA.map(x=>x.date))].sort();latest=dates[dates.length-1]||'';groups=[...new Set(DATA.map(x=>x.group).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));updateStats();$('date').innerHTML+=dates.map(d=>`<option value="${d}">${d}${d===latest?' NEW':''}</option>`).join('');$('group').innerHTML+=groups.map(g=>`<option value="${g}">${g}조</option>`).join('');const counts={};DATA.forEach(r=>counts[r.date]=(counts[r.date]||0)+1);$('dateChips').innerHTML=dates.map(d=>`<button class="chip ${d===latest?'latest':''}" data-date="${d}">${d.slice(5).replace('-', '/')} <small>${counts[d]}</small>${d===latest?' 🆕':''}</button>`).join('');document.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{$('date').value=btn.dataset.date;render();window.scrollTo({top:250,behavior:'smooth'})}));['q','date','group'].forEach(id=>$(id).addEventListener('input',render));render();}
loadData();
</script></body></html>
